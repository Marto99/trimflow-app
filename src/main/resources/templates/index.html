<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'TrimFlow | Barbershop SaaS'">TrimFlow | Barbershop SaaS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="landing-page">

<header class="landing-header">
    <a th:href="@{/}" class="logo">Trim<span>Flow</span></a>

    <div class="auth-actions">
        <a th:href="@{/login}" class="btn btn-outline">Login</a>
        <a th:href="@{/register}" class="btn btn-gold">Register</a>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <p class="eyebrow" th:text="${heroEyebrow} ?: 'Premium SaaS for modern barbershops'">Premium SaaS for modern barbershops</p>
        <h1 th:text="${heroTitle} ?: 'Manage bookings, barbers and clients with style.'">Manage bookings, barbers and clients with style.</h1>
        <p class="hero-text" th:text="${heroDescription} ?: 'TrimFlow helps barbershops organize appointments, services, customers and daily operations from one elegant dashboard.'">
            TrimFlow helps barbershops organize appointments, services, customers and daily operations from one elegant dashboard.
        </p>

        <div class="hero-buttons">
            <a th:href="@{/login}" class="btn btn-gold">Login</a>
            <a th:href="@{/register}" class="btn btn-outline">Create Account</a>
        </div>
    </div>
</section>

</body>
</html>
