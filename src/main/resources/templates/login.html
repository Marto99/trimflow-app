<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Login | TrimFlow'">Login | TrimFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<div class="auth-card">
    <a th:href="@{/}" class="auth-logo">Trim<span>Flow</span></a>

    <h1>Welcome back</h1>
    <p>Login to your TrimFlow workspace</p>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">Invalid credentials</div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Success message</div>

    <form th:action="@{/login}" method="post" th:object="${barbershopLoginRequest}">
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}" name="email" placeholder="admin@trimflow.com" required>
            <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</small>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" name="password" placeholder="••••••••" required>
            <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</small>
        </div>

        <button type="submit" class="btn btn-gold full">Login</button>
    </form>

    <div class="auth-footer">
        Don't have an account?
        <a th:href="@{/register}">Register</a>
    </div>
</div>

</body>
</html>
