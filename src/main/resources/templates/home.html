<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Dashboard | TrimFlow'">Dashboard | TrimFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <section class="dashboard">
        <h1 th:text="${welcomeTitle} ?: 'Welcome to TrimFlow'">Welcome to TrimFlow</h1>
        <p class="subtitle" th:text="${welcomeSubtitle} ?: 'Your barbershop command center.'">Your barbershop command center.</p>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Today Appointments</h3>
                <strong th:text="${todayAppointmentsCount} ?: 12">12</strong>
            </div>
            <div class="stat-card">
                <h3>Active Barbers</h3>
                <strong th:text="${activeBarbersCount} ?: 4">4</strong>
            </div>
            <div class="stat-card">
                <h3>Services</h3>
                <strong th:text="${servicesCount} ?: 8">8</strong>
            </div>
            <div class="stat-card">
                <h3>Revenue Today</h3>
                <strong th:text="${revenueToday} ?: '420 лв'">420 лв</strong>
            </div>
        </div>

        <div class="panel">
            <h2>Upcoming Appointments</h2>

            <table>
                <thead>
                <tr>
                    <th>Client</th>
                    <th>Barber</th>
                    <th>Service</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appointment : ${upcomingAppointments}">
                    <td th:text="${appointment.customer.fullName}">Ivan Petrov</td>
                    <td th:text="${appointment.barber.fullName}">George</td>
                    <td th:text="${appointment.hairService.name}">Hair + Beard</td>
                    <td th:text="${appointment.startTime}">14:30</td>
                    <td><span class="status" th:classappend="${#strings.toLowerCase(appointment.status.name())}" th:text="${appointment.status}">CONFIRMED</span></td>
                </tr>
                <tr th:if="${upcomingAppointments == null or #lists.isEmpty(upcomingAppointments)}">
                    <td colspan="5" class="empty-state">No upcoming appointments yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

</body>
</html>
